<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoNest - Life Stages</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #111827);
            min-height: 100vh;
            margin: 0;
            color: #e2e8f0;
        }

        .nav-bar {
            background: rgba(30, 41, 59, 0.7);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 750px;
            margin: 30px auto;
            background: rgba(30, 41, 59, 0.5);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1,
        .category-title {
            color: #fff;
            background: linear-gradient(90deg, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        label {
            font-weight: 500;
            margin-top: 10px;
            color: #94a3b8;
            display: block;
        }

        input,
        select,
        textarea {
            width: 100%;
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6);
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #818cf8;
        }

        button,
        .filter-btn {
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .filter-container {
            margin: 20px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            font-size: 0.9rem;
        }

        .filter-btn.active {
            background: linear-gradient(90deg, #818cf8, #f472b6);
            color: #fff;
            border: none;
        }

        .memory-item {
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.4);
            padding: 15px;
            margin-bottom: 12px;
        }

        .memory-date {
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="nav-bar">
        <div class="nav-logo">🪺 MemoNest Life Stages</div>
        <button onclick="window.location.href='PLATFORM.html'" style="background: rgba(255,255,255,0.1);">Back to Home
            Vault</button>
    </div>

    <div class="container">
        <h1>Organize Memories by Life Stage</h1>

        <form id="memory-form">
            <label>Memory Title</label>
            <input type="text" id="mem-title" placeholder="e.g., My first day at school" required>

            <label>Description</label>
            <textarea id="mem-desc" rows="3" placeholder="Describe the timeline experience details..."></textarea>

            <label>Select Life Stage</label>
            <select id="mem-category" required>
                <option value="" disabled selected>Choose Life Stage</option>
                <option>Childhood</option>
                <option>School</option>
                <option>College</option>
                <option>Family</option>
                <option>Friends</option>
                <option>Other</option>
            </select>
            <button type="submit">Save Stage Entry</button>
        </form>

        <div style="margin-top: 30px;">
            <label>Filter View Stage:</label>
            <div id="category-filters" class="filter-container"></div>
        </div>

        <div id="memory-list" style="margin-top: 20px;"></div>
    </div>

    <script>
        // Fetch baseline shared repository source context array setup
        let memories = JSON.parse(localStorage.getItem('memories') || '[]');

        function renderFilters(selectedCat = 'All') {
            const categories = ["All", "Childhood", "School", "College", "Family", "Friends", "Other"];
            document.getElementById('category-filters').innerHTML = categories.map(cat =>
                `<button class="filter-btn${cat === selectedCat ? ' active' : ''}" onclick="filterStage('${cat}')">${cat}</button>`
            ).join('');
        }

        function filterStage(cat) {
            renderFilters(cat);
            displayMemories(cat);
        }

        function displayMemories(filterCat = 'All') {
            memories = JSON.parse(localStorage.getItem('memories') || '[]');
            const listContainer = document.getElementById('memory-list');

            if (!memories.length) {
                listContainer.innerHTML = '<div style="color:#64748b;">No items recorded yet. Create an entry above!</div>';
                return;
            }

            let categoriesToDisplay = ["Childhood", "School", "College", "Family", "Friends", "Other"];
            if (filterCat !== 'All') {
                categoriesToDisplay = [filterCat];
            }

            let htmlContent = '';
            categoriesToDisplay.forEach(cat => {
                let catMemories = memories.filter(m => m.category === cat);
                if (catMemories.length > 0) {
                    htmlContent += `<h2 class="category-title" style="margin-top:20px; font-size:1.2rem;">${cat}</h2>`;
                    catMemories.forEach(m => {
                        htmlContent += `
                            <div class="memory-item">
                                <div style="font-weight:600; color:#a5b4fc;">${m.title}</div>
                                <div class="memory-date">${new Date(m.date).toLocaleDateString()}</div>
                                <div style="margin-top:5px; font-size:0.95rem;">${m.description || ''}</div>
                            </div>`;
                    });
                }
            });

            listContainer.innerHTML = htmlContent || '<div style="color:#64748b;">No memories in this stage category.</div>';
        }

        document.getElementById('memory-form').onsubmit = function (e) {
            e.preventDefault();
            const title = document.getElementById('mem-title').value.trim();
            const description = document.getElementById('mem-desc').value.trim();
            const category = document.getElementById('mem-category').value;

            memories = JSON.parse(localStorage.getItem('memories') || '[]');
            memories.unshift({
                id: Date.now(),
                title,
                description,
                category,
                date: new Date(),
                tags: []
            });

            localStorage.setItem('memories', JSON.stringify(memories));
            document.getElementById('memory-form').reset();
            filterStage('All');
        };

        // Initial launch configurations
        filterStage('All');
    </script>
</body>

</html>
