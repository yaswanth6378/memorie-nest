<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MemoNest - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            color: #e2e8f0;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #111827);
            position: relative;
        }

        .nav-bar {
            background: rgba(30, 41, 59, 0.7);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            padding: 2rem;
            margin-bottom: 24px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1,
        h2,
        .feature-title {
            margin-top: 0;
            background: linear-gradient(90deg, #cbd5e1, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 1rem;
            background: rgba(15, 23, 42, 0.6);
            color: #fff;
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #6366f1;
        }

        button,
        .btn {
            background: linear-gradient(90deg, #6366f1 0%, #4f46e5 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        button:hover,
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .hidden {
            display: none !important;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 100%));
            gap: 20px;
            margin-top: 15px;
        }

        .memory-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .memory-card h3 {
            margin: 0 0 0.5rem 0;
            color: #818cf8;
        }

        .memory-card img,
        .memory-card video {
            width: 100%;
            border-radius: 8px;
            margin: 10px 0;
            max-height: 250px;
            object-fit: cover;
        }

        .memory-card audio {
            width: 100%;
            margin: 10px 0;
        }

        .tag-badge {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 5px;
            display: inline-block;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <div class="nav-bar">
        <div class="nav-logo">🪺 MemoNest</div>
        <div class="flex-row">
            <button class="btn btn-secondary" onclick="window.location.href='STAGES.html'">🗂️ View Life Stages
                Screen</button>
            <button class="btn btn-secondary" onclick="window.location.href='LOGIN.html'">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="section">
            <button onclick="showUploadForm()" id="upload-mem-btn">➕ Upload a New Memory</button>
            <form id="upload-form" class="hidden">
                <h2>Add Memory Record</h2>
                <input type="text" id="mem-title" placeholder="Memory Title" required>
                <textarea id="mem-desc" rows="3" placeholder="What happened? Write down your story..."></textarea>

                <select id="mem-category" required>
                    <option value="" disabled selected>Select Life Stage Category</option>
                    <option>Childhood</option>
                    <option>School</option>
                    <option>College</option>
                    <option>Family</option>
                    <option>Friends</option>
                    <option>Other</option>
                </select>

                <input type="text" id="mem-tags" placeholder="Tags (comma-separated: summer, birthday, trip)">

                <label style="display:block; margin: 10px 0 5px 0;">Attach Photo:</label>
                <input type="file" id="mem-photo" accept="image/*">

                <label style="display:block; margin: 10px 0 5px 0;">Attach Video:</label>
                <input type="file" id="mem-video" accept="video/*">

                <label style="display:block; margin: 10px 0 5px 0;">Attach Audio Note:</label>
                <input type="file" id="mem-audio" accept="audio/*">

                <div style="margin-top: 15px;" class="flex-row">
                    <button type="submit">Save Memory</button>
                    <button type="button" class="btn btn-secondary" onclick="hideUploadForm()">Cancel</button>
                </div>
            </form>
        </div>

        <div class="section flex-row">
            <input id="search-bar" type="text" placeholder="🔍 Search description text..." oninput="displayMemories()"
                style="flex: 2; min-width: 200px;">
            <select id="cat-bar" onchange="displayMemories()" style="flex: 1; min-width: 150px;">
                <option value="">All life stages</option>
                <option>Childhood</option>
                <option>School</option>
                <option>College</option>
                <option>Family</option>
                <option>Friends</option>
                <option>Other</option>
            </select>
            <div id="reminder-msg" style="color: #f472b6; font-weight: 600; width: 100%;"></div>
            <a id="download-link" class="hidden" href="#" download="memonest_backup.json"
                style="color: #818cf8; text-decoration: none; font-weight: 600;">💾 Download Backup Data</a>
        </div>

        <div class="section">
            <h2>Your Interactive Timeline</h2>
            <div id="timeline-content" style="color:#94a3b8; border-left: 2px solid #334155; padding-left: 15px;"></div>
        </div>

        <div class="section">
            <h2>Your Memories Vault</h2>
            <div id="memories-list" class="memory-grid">
                <p style="color:#64748b;">No memories saved yet.</p>
            </div>
        </div>
    </div>

    <script>
        let memories = JSON.parse(localStorage.getItem('memories') || '[]');

        function showUploadForm() {
            document.getElementById('upload-form').classList.remove('hidden');
            document.getElementById('upload-mem-btn').classList.add('hidden');
        }

        function hideUploadForm() {
            document.getElementById('upload-form').reset();
            document.getElementById('upload-form').classList.add('hidden');
            document.getElementById('upload-mem-btn').classList.remove('hidden');
        }

        function fileToDataURL(file) {
            return new Promise(resolve => {
                if (!file) return resolve(null);
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('upload-form').onsubmit = async function (e) {
            e.preventDefault();
            const title = document.getElementById('mem-title').value.trim();
            const description = document.getElementById('mem-desc').value.trim();
            const category = document.getElementById('mem-category').value;
            const tags = document.getElementById('mem-tags').value.split(',').map(t => t.trim()).filter(Boolean);

            const photo = await fileToDataURL(document.getElementById('mem-photo').files[0]);
            const video = await fileToDataURL(document.getElementById('mem-video').files[0]);
            const audio = await fileToDataURL(document.getElementById('mem-audio').files[0]);

            let mem = { id: Date.now(), title, description, category, date: new Date(), tags, photo, video, audio };
            memories.unshift(mem);

            localStorage.setItem('memories', JSON.stringify(memories));
            hideUploadForm();
            displayMemories();
            updateTimeline();
            updateDownloadLink();
        };

        function deleteMemory(id) {
            if (confirm("Are you sure you want to delete this memory safely?")) {
                memories = memories.filter(m => m.id !== id);
                localStorage.setItem('memories', JSON.stringify(memories));
                displayMemories();
                updateTimeline();
                updateDownloadLink();
            }
        }

        function displayMemories() {
            const area = document.getElementById('memories-list');
            const searchKeyword = document.getElementById('search-bar').value.toLowerCase();
            const selectedCategory = document.getElementById('cat-bar').value;

            memories = JSON.parse(localStorage.getItem('memories') || '[]');

            let filtered = memories.filter(m => {
                const matchesSearch = m.title.toLowerCase().includes(searchKeyword) || m.description.toLowerCase().includes(searchKeyword);
                const matchesCat = !selectedCategory || m.category === selectedCategory;
                return matchesSearch && matchesCat;
            });

            if (!filtered.length) {
                area.innerHTML = '<span style="color:#64748b;">No matching memories found.</span>';
                return;
            }

            area.innerHTML = filtered.map(m => `
                <div class="memory-card">
                    <h3>${m.title}</h3>
                    <span style="font-size:0.8rem; color:#64748b;">${m.category} • ${new Date(m.date).toLocaleDateString()}</span>
                    <p style="margin: 10px 0; font-size:0.95rem;">${m.description}</p>
                    
                    ${m.photo ? `<img src="${m.photo}" alt="memory picture">` : ''}
                    ${m.video ? `<video src="${m.video}" controls></video>` : ''}
                    ${m.audio ? `<audio src="${m.audio}" controls></audio>` : ''}
                    
                    <div style="margin-top:10px;">
                        ${m.tags.map(t => `<span class="tag-badge">#${t}</span>`).join('')}
                    </div>
                    <button onclick="deleteMemory(${m.id})" style="background:#ef4444; margin-top:15px; padding:5px 10px; font-size:0.85rem;">Delete</button>
                </div>
            `).join('');
        }

        function updateTimeline() {
            const tcont = document.getElementById('timeline-content');
            if (!memories.length) {
                tcont.innerHTML = 'Add memories to unlock timeline viewpoints.';
                return;
            }

            let events = {};
            memories.forEach(m => {
                let yr = (new Date(m.date)).getFullYear();
                if (!events[yr]) events[yr] = [];
                events[yr].push(m);
            });

            let years = Object.keys(events).sort((a, b) => b - a);
            let html = '';
            for (let yr of years) {
                html += `<div style="color:#818cf8; font-weight:700; margin-top:10px;">${yr}</div>`;
                for (let m of events[yr]) {
                    html += `<div style="padding: 5px 0 5px 10px; font-size:0.9rem;">• <b>${m.title}</b> (${m.category})</div>`;
                }
            }
            tcont.innerHTML = html;
        }

        function updateDownloadLink() {
            let link = document.getElementById('download-link');
            if (!memories.length) {
                link.classList.add('hidden');
                return;
            }
            let blob = new Blob([JSON.stringify(memories)], { type: "application/json" });
            link.href = URL.createObjectURL(blob);
            link.classList.remove('hidden');
        }

        window.onload = function () {
            displayMemories();
            updateTimeline();
            updateDownloadLink();
        }
    </script>
</body>

</html>
