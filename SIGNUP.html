<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoryNest - Sign Up</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #311042);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #f1f5f9;
            margin: 0;
        }

        .signup-container {
            background: rgba(30, 41, 59, 0.7);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 380px;
            max-width: 90vw;
            text-align: center;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .signup-logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .signup-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1.8rem;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #a5b4fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            width: 100%;
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-group label {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
            margin-left: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 0.85rem;
            margin-top: 0.4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(15, 23, 42, 0.6);
            color: #fff;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f472b6;
            box-shadow: 0 0 12px rgba(244, 114, 182, 0.4);
            background: rgba(15, 23, 42, 0.8);
        }

        .signup-btn {
            width: 100%;
            background: linear-gradient(90deg, #f472b6 0%, #db2777 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0.95rem 0;
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(244, 114, 182, 0.3);
            letter-spacing: 0.5px;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244, 114, 182, 0.5);
            background: linear-gradient(90deg, #db2777 0%, #be185d 100%);
        }

        .login-link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .login-link a {
            color: #f472b6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-link a:hover {
            color: #fbcfe8;
            text-decoration: underline;
        }

        .social-signup {
            margin-top: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.75rem 0;
            border-radius: 12px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .social-signup:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <div class="signup-logo">🪺</div>
        <div class="signup-title">Create Nest Account</div>
        <form id="signup-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="signup-email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="signup-confirm" placeholder="••••••••" required>
            </div>
            <button class="signup-btn" type="submit">Sign Up</button>
        </form>
        <div class="login-link">
            Already have an account? <a href="LOGIN.html">Log In</a>
        </div>
        <div class="social-signup">
            Sign up with Google
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            let users = JSON.parse(localStorage.getItem('users')) || [];

            if (users.some(user => user.email === email)) {
                alert('Email already registered. Redirecting to login page.');
                window.location.href = "LOGIN.html";
                return;
            }

            users.push({ email, password });
            localStorage.setItem('users', JSON.stringify(users));

            alert('Signup successful! Welcome aboard.');
            window.location.href = "LOGIN.html";
        });
    </script>
</body>

</html>
